{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — PLASU Traffic Management System</title>
<link rel="stylesheet" href="{% static 'traffic/css/style.css' %}">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">TMS</div>
      <div class="auth-title">Welcome Back</div>
      <div class="auth-sub">PSU Traffic Management System — Plateau State University, Bokkos</div>
    </div>

    {% for message in messages %}
    <div class="alert alert-danger">{{ message }}</div>
    {% endfor %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px;">Login</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="{% url 'register' %}">Register here</a>
    </div>
  </div>
</div>
</body>
</html>
